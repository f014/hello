<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
  }
  .game-wrapper {
    text-align: center;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding: 0 10px;
  }
  .score {
    color: #e94560;
    font-size: 22px;
    font-weight: bold;
  }
  .best {
    color: #888;
    font-size: 14px;
  }
  canvas {
    border: 2px solid #e94560;
    border-radius: 4px;
    background: #16213e;
    display: block;
    max-width: 100vw;
    max-height: calc(100vh - 100px);
  }
  .hint {
    color: #555;
    margin-top: 12px;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <span class="score">分数: <span id="score">0</span></span>
    <span class="best">最高: <span id="best">0</span></span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="hint">方向键移动 | 空格暂停</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const COLS = 20;
const ROWS = 20;
let CELL;

let snake, food, direction, nextDirection, score, best, gameState, timer;

function resize() {
  const maxW = window.innerWidth - 20;
  const maxH = window.innerHeight - 110;
  CELL = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  CELL = Math.max(12, Math.min(CELL, 32));
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  draw();
}

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
best = parseInt(localStorage.getItem('snakeBest')) || 0;
bestEl.textContent = best;

function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10},
  ];
  direction = {dx: 1, dy: 0};
  nextDirection = {dx: 1, dy: 0};
  score = 0;
  scoreEl.textContent = '0';
  gameState = 'ready';
  spawnFood();
  draw();
}

function spawnFood() {
  const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
  const free = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) free.push({x, y});
    }
  }
  food = free[Math.floor(Math.random() * free.length)];
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 食物
  const pulse = 1 + 0.15 * Math.sin(Date.now() / 200);
  ctx.save();
  ctx.translate(food.x * CELL + CELL/2, food.y * CELL + CELL/2);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(0, 0, CELL/2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 蛇身
  for (let i = snake.length - 1; i >= 0; i--) {
    const t = snake.length > 1 ? i / (snake.length - 1) : 0;
    const r = Math.floor(15 + t * 40);
    const g = Math.floor(180 + t * 60);
    const b = Math.floor(80 + t * 60);
    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.fillRect(
      snake[i].x * CELL + 1,
      snake[i].y * CELL + 1,
      CELL - 2,
      CELL - 2
    );
  }

  // 蛇头眼睛
  const head = snake[0];
  const hx = head.x * CELL + CELL/2;
  const hy = head.y * CELL + CELL/2;
  const eyeOff = CELL * 0.2;
  const eyeFwd = CELL * 0.15;
  const eyeR = Math.max(2, CELL * 0.13);
  let ex1, ey1, ex2, ey2;
  if (direction.dx === 1) {
    ex1 = hx + eyeFwd; ey1 = hy - eyeOff;
    ex2 = hx + eyeFwd; ey2 = hy + eyeOff;
  } else if (direction.dx === -1) {
    ex1 = hx - eyeFwd; ey1 = hy - eyeOff;
    ex2 = hx - eyeFwd; ey2 = hy + eyeOff;
  } else if (direction.dy === -1) {
    ex1 = hx - eyeOff; ey1 = hy - eyeFwd;
    ex2 = hx + eyeOff; ey2 = hy - eyeFwd;
  } else {
    ex1 = hx - eyeOff; ey1 = hy + eyeFwd;
    ex2 = hx + eyeOff; ey2 = hy + eyeFwd;
  }
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
  ctx.fill();

  // 状态文字
  if (gameState === 'ready') {
    overlayText('按方向键开始', '#fff');
  } else if (gameState === 'paused') {
    overlayText('暂停中', '#ffc107');
  } else if (gameState === 'gameover') {
    overlayText('游戏结束', '#e94560');
  }
}

function overlayText(text, color) {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, canvas.height/2 - 30, canvas.width, 60);
  ctx.fillStyle = color;
  ctx.font = `bold ${Math.round(CELL * 1.2)}px "Courier New"`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width/2, canvas.height/2);
}

function step() {
  direction = {...nextDirection};

  const head = snake[0];
  const newHead = {x: head.x + direction.dx, y: head.y + direction.dy};

  // 撞墙
  if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
    gameOver();
    return;
  }

  // 撞自己
  if (snake.some(p => p.x === newHead.x && p.y === newHead.y)) {
    gameOver();
    return;
  }

  snake.unshift(newHead);

  if (newHead.x === food.x && newHead.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  gameState = 'gameover';
  clearInterval(timer);
  timer = null;
  if (score > best) {
    best = score;
    bestEl.textContent = best;
    localStorage.setItem('snakeBest', best);
  }
  draw();
}

function startGame() {
  if (timer) clearInterval(timer);
  timer = setInterval(step, 130);
  gameState = 'playing';
}

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    clearInterval(timer);
    timer = null;
    draw();
  } else if (gameState === 'paused') {
    startGame();
    draw();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'gameover') {
      init();
    } else if (gameState === 'ready' || gameState === 'playing' || gameState === 'paused') {
      togglePause();
      if (gameState === 'ready') startGame();
    }
    return;
  }

  if (gameState === 'gameover' || gameState === 'paused') return;

  const keyMap = {
    ArrowUp:    {dx: 0, dy: -1},
    ArrowDown:  {dx: 0, dy: 1},
    ArrowLeft:  {dx: -1, dy: 0},
    ArrowRight: {dx: 1, dy: 0},
    w: {dx: 0, dy: -1},
    s: {dx: 0, dy: 1},
    a: {dx: -1, dy: 0},
    d: {dx: 1, dy: 0},
  };

  const dir = keyMap[e.key];
  if (!dir) return;
  e.preventDefault();

  // 防止反向
  if (dir.dx === -direction.dx && dir.dy === -direction.dy) return;

  nextDirection = dir;

  if (gameState === 'ready') {
    startGame();
  }
});

init();
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(function loop() {
  if (gameState === 'playing') draw();
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
